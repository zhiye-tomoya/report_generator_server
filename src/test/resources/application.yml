spring:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver

jwt:
  secret: test-secret-key-minimum-256-bits-for-hs256-algorithm-test-environment-only-for-testing
  expiration: 86400000
  refresh-expiration: 604800000
